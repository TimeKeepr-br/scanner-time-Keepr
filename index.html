<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Keepr | Quantum Vision Scanner</title>
    <style>
        /* === ARQUITETURA DE ESTILOS AVANÇADA === */
        :root {
            --bg-base: #030303;
            --hud-gold: #D4AF37;
            --hud-gold-glow: rgba(212, 175, 55, 0.4);
            --hud-cyan: #00E5FF;
            --text-main: #E0E0E0;
            --text-dim: #666666;
            --panel-bg: rgba(10, 10, 10, 0.85);
            --border-tech: 1px solid rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        }

        /* Header HUD */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: var(--border-tech);
            background: linear-gradient(90deg, rgba(0,0,0,1) 0%, rgba(20,20,15,1) 50%, rgba(0,0,0,1) 100%);
        }

        .brand {
            font-size: 24px;
            font-weight: bold;
            color: var(--hud-gold);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--hud-gold-glow);
        }

        .status-sys { font-size: 12px; color: var(--hud-cyan); letter-spacing: 2px; }

        /* Core Layout */
        main {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        /* Viewport da Câmera com Processamento */
        .vision-core {
            flex: 2;
            position: relative;
            border: var(--border-tech);
            border-radius: 4px;
            overflow: hidden;
            background: #000;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 0 20px var(--hud-gold-glow);
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas { z-index: 10; opacity: 0.8; mix-blend-mode: screen; }

        /* Retícula de Mira */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            z-index: 20;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: var(--hud-cyan); }
        .crosshair::before { top: 50%; left: -20px; width: 40px; height: 1px; }
        .crosshair::after { top: -20px; left: 50%; width: 1px; height: 40px; }

        /* Painel de Dados Lateral */
        .data-panel {
            flex: 1;
            background: var(--panel-bg);
            border: var(--border-tech);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(5px);
        }

        .panel-title { color: var(--hud-gold); font-size: 14px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; }

        .terminal {
            flex: 1;
            background: #050505;
            border: 1px solid #222;
            padding: 15px;
            font-size: 11px;
            color: #00FF00;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* Cartão de Resultado */
        .result-card {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--hud-gold);
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 15px;
            animation: pulseCard 2s infinite;
        }

        .result-img-container {
            width: 100%;
            height: 200px;
            border: 1px solid #333;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .result-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .result-info h2 { color: #FFF; font-size: 18px; margin-bottom: 5px; }
        .result-info .price { color: var(--hud-gold); font-size: 24px; font-weight: bold; }
        .result-info .desc { color: var(--text-dim); font-size: 12px; margin-top: 10px; line-height: 1.4; }

        /* Controles */
        .btn-core {
            background: transparent;
            color: var(--hud-gold);
            border: 1px solid var(--hud-gold);
            padding: 15px;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .btn-core:hover:not(:disabled) { background: var(--hud-gold); color: #000; box-shadow: 0 0 15px var(--hud-gold-glow); }
        .btn-core:disabled { border-color: #333; color: #555; cursor: not-allowed; }

        @keyframes pulseCard { 0% { box-shadow: 0 0 0 rgba(212,175,55,0); } 50% { box-shadow: 0 0 15px rgba(212,175,55,0.2); } 100% { box-shadow: 0 0 0 rgba(212,175,55,0); } }
    </style>
</head>
<body>

            { id: 6, name: "OPK Quartz", price: 159.90, img: "https://dcdn-us.mitiendanube.com/stores/006/876/038/products/1000103090-9cffe9e594ce2e0e0117671061192121-320-0.webp", stock: 15, gender: 'M', desc: "O parceiro do homem corporativo. Perfil ultrafino e minimalista, desenhado para deslizar perfeitamente sob a camisa social." },
            { id: 7, name: "Curren Cobre", price: 159.90, img: "https://dcdn-us.mitiendanube.com/stores/006/876/038/products/1000090202-765070a7d714989b5417632183305158-320-0.webp", stock: 9, gender: 'M', desc: "Elegância rústica. O acabamento acobreado exclusivo traz um toque vintage e imponente para o estilo masculino." },
            { id: 8, name: "Oruss 1853 Classic", price: 129.90, img: "https://dcdn-us.mitiendanube.com/stores/006/876/038/products/inbound7295089341951479154-00b23894acbabdd52717614131309472-320-0.webp", stock: 7, gender: 'M', desc: "Tradição e respeito. Uma peça com pegada retrô para o cavalheiro que valoriza a verdadeira arte da relojoaria." },
            { id: 9, name: "Oruss 1853 Dark", price: 129.90, img: "https://dcdn-us.mitiendanube.com/stores/006/876/038/products/inbound2992636078921850236-1d12ce720b33e352f217614131541944-320-0.webp", stock: 11, gender: 'M', desc: "Sobriedade noturna. A versão escurecida do clássico 1853 para homens que buscam discrição com alta classe." },
            { id: 10, name: "Poedagar Deluxe Edition", price: 159.90, img: "https://sc04.alicdn.com/kf/H524f1ec4448f4603a83644e41a093c1eL.jpg", stock: 14, gender: 'M', desc: "Para quem não para. Design esportivo de alta performance com ponteiros luminosos para o homem sempre em movimento." },
            { id: 101, name: "Geneve Aristocrat", price: 139.90, img: "https://http2.mlstatic.com/D_Q_NP_2X_880905-MLB108545007037_032026-P.webp", stock: 10, gender: 'M', desc: "O tempo é o único luxo que não se pode recuperar. Domine cada segundo com a precisão de quem sabe onde quer chegar. All Black: Discrição para quem tem presença absoluta." },
            { id: 102, name: "Poedagar Deluxe Edition", price: 129.90, img: "https://poedagareco.com/cdn/shop/files/deluxe-preto.webp?v=1769277973&width=700", stock: 10, gender: 'M', desc: "Tempo, estilo e presença. Conheça o novo Poedagar Deluxe Edition." },
            { id: 103, name: "Crrju Matrix 5018", price: 139.90, img: "https://http2.mlstatic.com/D_Q_NP_665008-MLB107600586966_032026-L.webp", stock: 10, gender: 'M', desc: "Eleve seu visual com o Crrju Matrix 5018. Um relógio imponente, com ponteiros luminosos e calendário funcional. Estilo premium para todas as ocasiões." },
            { id: 104, name: "Oceanic Precision", price: 129.90, img: "https://elitewatchess.com/cdn/shop/files/poedagar-luxury-man-quartz-watch-sport-military-watch-for-men-waterproof-luminous-date-chronograph-stainless-steel-mens-970silverblue-white-6708755068469-large.jpg?v=1730744319", stock: 10, gender: 'M', desc: "Descrição para o novo relógio masculino aqui." },
            { id: 105, name: "Binbond Denton", price: 134.90, img: "https://http2.mlstatic.com/D_NQ_NP_971558-MLA91919254438_092025-O.webp", stock: 10, gender: 'M', desc: "Sofisticação em cada detalhe e presença marcante para o homem moderno. O equilíbrio perfeito entre luxo e precisão." },
            { id: 106, name: "Curren Imperial", price: 159.90, img: "https://http2.mlstatic.com/D_NQ_NP_727192-MLB48161571217_112021-O.webp", stock: 8, gender: 'M', desc: "Cronógrafo de alta precisão. Acabamento em aço escovado para um visual executivo de impacto." },

            // === FEMININOS ===
            { id: 11, name: "Classic OPK", price: 179.90, img: "https://down-br.img.susercontent.com/file/br-11134207-7r98p-lmwtr0fa64ty24", stock: 3, gender: 'F', desc: "Simplicidade e charme. Uma joia atemporal que realça a beleza e a delicadeza do pulso feminino em qualquer ocasião." },
            { id: 12, name: "Royal Rose Gold", price: 119.90, img: "https://down-br.img.susercontent.com/file/sg-11134301-7rast-mack7ohsh81v13", stock: 6, gender: 'F', desc: "Brilho e sofisticação em ouro rosé. Mostrador texturizado que transborda feminilidade e elegância absoluta." },
            { id: 13, name: "Chronos Black Edition", price: 99.90, img: "https://down-br.img.susercontent.com/file/sg-11134301-7rasp-macnoa7i6gyjff", stock: 20, gender: 'F', desc: "Para mulheres de atitude. O preto fosco entrega um visual contemporâneo, ousado e cheio de empoderamento." },
            { id: 14, name: "Executive Gold", price: 139.90, img: "https://http2.mlstatic.com/D_Q_NP_789894-CBT87461640011_072025-O.webp", stock: 5, gender: 'F', desc: "Feito para a mulher líder. Detalhes em dourado que transmitem confiança, sucesso e autoridade no ambiente corporativo." },
            { id: 15, name: "Minimalist Steel", price: 49.90, img: "https://a-static.mlcdn.com.br/%7Bw%7Dx%7Bh%7D/relogio-feminino-moda-pequena-arabe-relogios-de-quartzo-pulseira-de-couro-relogios-de-pulso-none/aliexpress/207225178/07f97f54c977bc9de18e9f3fb185c86a.jpeg", stock: 18, gender: 'F', desc: "O clássico feminino reinventado. Caixa pequena e pulseira delicada, ideal para mulheres que amam a discrição luxuosa." },
            { id: 16, name: "Phantom Carbon", price: 99.90, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgNhWcWuRZXGx2tloexYXq0dWWf_ys_hk3T5wlRs8hqrTrDMg5", stock: 10, gender: 'F', desc: "Leveza e modernidade. Um design imponente que une força e sofisticação para o dia a dia da mulher contemporânea." },
            { id: 201, name: "Saint Germain chelsea Gold", price: 209.90, img: "https://acdn-us.mitiendanube.com/stores/001/116/055/products/dourado-32mm-b-frente-site1-c12a4dc3e8c4f1aeee16339562806579-640-0.webp", stock: 10, gender: 'F', desc: "A definição de sofisticação em cada segundo. O brilho do ouro encontra o design atemporal da Saint Germain para quem não abre mão do extraordinário." },
            { id: 202, name: "Saint Germain Harlem Silver", price: 169.90, img: "https://acdn-us.mitiendanube.com/stores/001/116/055/products/prata-32mm-b-frente-site1-c61b59639ae96d1dad16339564289314-640-0.webp", stock: 10, gender: 'F', desc: "Um clássico contemporâneo para acompanhar cada segundo do dia. Prateado, versátil e essencial." }
        ];

        // Elementos de Controle
        const video = document.getElementById('raw-video');
        const canvas = document.getElementById('cv-layer');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const terminal = document.getElementById('console-output');
        const btnInit = document.getElementById('btn-init');
        const btnScan = document.getElementById('btn-scan');
        const targetLock = document.getElementById('target-lock');

        let isScanning = false;
        let animationFrameId;

        // Função para escrever no terminal
        function logTerminal(msg) {
            const span = document.createElement('span');
            span.textContent = `> ${msg}`;
            terminal.appendChild(span);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Inicializa a câmera e o loop de renderização do Canvas
        async function bootSystem() {
            try {
                logTerminal('Solicitando permissão de hardware...');
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    logTerminal(`Link estabelecido. Resolução: ${canvas.width}x${canvas.height}`);
                    
                    // Inicia o processamento visual (Efeito Edge Detection)
                    processVisuals();
                    
                    btnInit.style.display = 'none';
                    btnScan.disabled = false;
                };
            } catch (err) {
                logTerminal(`ERRO CRÍTICO: ${err.message}`);
            }
        }

        // Motor de Processamento de Imagem em Tempo Real
        function processVisuals() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                if (isScanning) {
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    
                    for (let i = 0; i < data.length; i += 4) {
                        let r = data[i];
                        let g = data[i + 1];
                        let b = data[i + 2];
                        let avg = (r + g + b) / 3;
                        
                        data[i] = 0;       
                        data[i + 1] = avg; 
                        data[i + 2] = 0;   
                    }
                    ctx.putImageData(imageData, 0, 0);

                    ctx.fillStyle = 'rgba(212, 175, 55, 0.5)';
                    ctx.fillRect(0, (Date.now() / 5) % canvas.height, canvas.width, 10);
                }
            }
            animationFrameId = requestAnimationFrame(processVisuals);
        }

        // Algoritmo de Scan Simulado
        async function executeScan() {
            isScanning = true;
            btnScan.disabled = true;
            document.getElementById('match-result').style.display = 'none';
            targetLock.style.borderColor = 'var(--hud-gold)';
            targetLock.style.transform = 'translate(-50%, -50%) scale(0.8)';

            logTerminal('Capturando frame do buffer...');
            await sleep(500);
            logTerminal('Aplicando convolução matriz 3x3...');
            await sleep(600);
            logTerminal('Extraindo topologia geométrica...');
            await sleep(700);
            logTerminal('Comparando features com Banco TIME KEEPR...');
            await sleep(800);

            // Simula a identificação de um dos relógios do catálogo
            const matchedItem = database[Math.floor(Math.random() * database.length)];
            
            logTerminal(`MATCH ENCONTRADO [Probabilidade 98.4%]`);
            logTerminal(`Identificador ID-${matchedItem.id}: ${matchedItem.name}`);

            renderResult(matchedItem);

            isScanning = false;
            btnScan.disabled = false;
            targetLock.style.borderColor = 'rgba(0, 229, 255, 0.3)';
            targetLock.style.transform = 'translate(-50%, -50%) scale(1)';
        }

        function renderResult(item) {
            document.getElementById('match-img').src = item.img;
            document.getElementById('match-name').textContent = item.name.toUpperCase();
            document.getElementById('match-price').textContent = item.price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('match-desc').textContent = item.desc;
            document.getElementById('match-result').style.display = 'flex';
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        // Binds
        btnInit.addEventListener('click', bootSystem);
        btnScan.addEventListener('click', executeScan);
    </script>
</body>
</html>
